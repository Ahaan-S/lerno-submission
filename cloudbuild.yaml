steps:
  # ── Build Docker image ───────────────────────────────────────────────────────
  # NEXT_PUBLIC_* vars are baked into the client JS bundle at build time.
  # They are passed as --substitutions from the trigger (not Secret Manager)
  # because they are not sensitive enough to require a secret, and Secret Manager
  # access during builds adds IAM complexity.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--build-arg=NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}'
      - '--build-arg=NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}'
      - '--build-arg=NEXT_PUBLIC_SENTRY_DSN=${_NEXT_PUBLIC_SENTRY_DSN}'
      - '--build-arg=SENTRY_ORG=${_SENTRY_ORG}'
      - '--build-arg=SENTRY_PROJECT=${_SENTRY_PROJECT}'
      - '--build-arg=SENTRY_AUTH_TOKEN=${_SENTRY_AUTH_TOKEN}'
      - '--build-arg=CI=true'
      - '-t=asia-south1-docker.pkg.dev/$PROJECT_ID/lerno/lerno-web:${_TAG}'
      - '-t=asia-south1-docker.pkg.dev/$PROJECT_ID/lerno/lerno-web:latest'
      - '.'

  # ── Push image ───────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    waitFor: ['build']
    args:
      - 'push'
      - '--all-tags'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/lerno/lerno-web'

  # ── Deploy to Cloud Run ──────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    waitFor: ['push']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'lerno-web'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/lerno/lerno-web:${_TAG}'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--project=$PROJECT_ID'

substitutions:
  _TAG: 'latest'
  _NEXT_PUBLIC_SUPABASE_URL: ''
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ''
  _NEXT_PUBLIC_SENTRY_DSN: ''
  _SENTRY_ORG: ''
  _SENTRY_PROJECT: ''
  _SENTRY_AUTH_TOKEN: ''

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
